name: CI

on:
  push:
    branches: [main, 001-local-speech-to-text]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  pre-commit:
    name: pre-commit hooks
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Need history back to the PR base so pre-commit can diff against it
          # and only check files changed in this PR.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install hook dependencies
        run: |
          brew install swiftlint gitleaks
          npm install -g markdownlint-cli@0.43.0

      - name: Determine diff range
        id: range
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            # push / workflow_dispatch: diff the pushed range if available.
            raw="${{ github.event.before }}"
            if [[ -z "$raw" || "$raw" == "0000000000000000000000000000000000000000" ]]; then
              # Initial push of a new branch, or force-push from empty:
              # HEAD~1 does not exist. Fall back to the repository's first
              # commit so pre-commit sees every file in the push as "new".
              if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                base_ref="HEAD~1"
              else
                base_ref="$(git rev-list --max-parents=0 HEAD | tail -1)"
              fi
            else
              base_ref="$raw"
            fi
          fi
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
          echo "using diff range: ${base_ref}...HEAD"

      # Only check files changed in this PR (or push range) so we're not
      # enforcing hook compliance retroactively on the whole repository. CI
      # pre-commit exists to catch developers who bypass the local hook with
      # `--no-verify`, not to block PRs on pre-existing legacy files.
      - name: Run pre-commit on changed files
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --from-ref ${{ steps.range.outputs.base_ref }} --to-ref HEAD

  test:
    name: Build and Test
    runs-on: macos-15
    needs: [lint, pre-commit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode version
        # Xcode 16.4 ships Swift 6.1 (Xcode 16.2 ships 6.0.3, which fails to
        # resolve mlx-swift-lm 3.31.x — that package's Package.swift declares
        # `swift-tools-version: 6.1`). Bumped 2026-04-26 in #3.
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache sherpa-onnx xcframework
        uses: actions/cache@v5
        with:
          path: Frameworks/sherpa-onnx.xcframework
          key: sherpa-onnx-v1.12.20-${{ runner.os }}

      - name: Setup sherpa-onnx xcframework
        run: ./scripts/setup-sherpa-onnx.sh

      - name: Resolve dependencies
        run: swift package resolve

      # Sanity-check the CI summary parser before we commit to parsing real
      # build/test logs with it. Cheap (<1s) and guarantees a broken
      # regex change can't ship a silently-empty summary.
      - name: ci-summary self-test
        run: python3 scripts/ci-summary.py --self-test

      # We `tee` build + test output to log files so the `CI summary` step
      # below can parse them into `$GITHUB_STEP_SUMMARY`. `set -eo pipefail`
      # preserves the underlying exit status across the pipe — without it,
      # `tee` would mask a `swift build` failure. `touch` up-front so the
      # file always exists even if the underlying command exits before
      # emitting a single line, which lets `_log_status` distinguish
      # "empty" from "missing" cleanly.
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          : > build.log
          swift build -c release 2>&1 | tee build.log

      # Unit tests — the GitHub Actions runner has no microphone, no
      # Accessibility (TCC) grant, no display server, and no user keychain.
      # Classes that exercise those APIs are skipped here and run on the
      # remote Mac via the pre-push hook instead. The by-name skip list is
      # temporary; it migrates to a tag filter once the Swift Testing tag
      # scheme lands (see the testing framework EPIC).
      #
      # Skipped classes and why:
      #   AudioCaptureServiceTests          AVAudioEngine.start (real mic)
      #   PermissionServiceTests            AXIsProcessTrustedWithOptions / TCC
      #   TextInsertionServiceTests         CGEventPost + display server
      #   VoiceTriggerMonitoringServiceTests transitively needs real mic
      #   WakeWordServiceTests              reads real WAV fixtures from models
      #   GeneralSectionPersistenceTests    shared UserDefaults race under --parallel;
      #                                     tracked for fix, runs pre-push serially.
      #   KeychainSecureStoreTests          real macOS Keychain — Swift Testing suite
      #                                     tagged .requiresHardware; will migrate to
      #                                     --skip-tag requiresHardware once #31 lands.
      - name: Run unit tests (with coverage)
        shell: bash
        run: |
          set -euo pipefail
          : > test.log
          swift test --parallel --enable-code-coverage \
            --skip AudioCaptureServiceTests \
            --skip PermissionServiceTests \
            --skip TextInsertionServiceTests \
            --skip VoiceTriggerMonitoringServiceTests \
            --skip WakeWordServiceTests \
            --skip GeneralSectionPersistenceTests \
            --skip KeychainSecureStoreTests 2>&1 | tee test.log

      # Coverage export is a *required* part of this job — the whole point is
      # PR-visible coverage. A missing profdata / xctest bundle / binary
      # means something is wrong with the test-run layout, not a soft edge
      # case to warn past. Fail the step so we don't silently ship a PR
      # with no coverage report.
      - name: Export coverage (lcov)
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          BIN_PATH=$(swift build --show-bin-path)
          PROF="${BIN_PATH}/codecov/default.profdata"
          if [[ ! -f "${PROF}" ]]; then
            echo "::error::profdata not found at ${PROF} — test run produced no coverage"
            exit 1
          fi
          TEST_BUNDLE=$(find "${BIN_PATH}" -maxdepth 1 -name '*.xctest' -type d | head -1)
          if [[ -z "${TEST_BUNDLE}" ]]; then
            echo "::error::no .xctest bundle found in ${BIN_PATH}"
            exit 1
          fi
          TEST_BIN=$(find "${TEST_BUNDLE}/Contents/MacOS" -type f -perm -u+x | head -1)
          if [[ -z "${TEST_BIN}" ]]; then
            echo "::error::no test binary found in ${TEST_BUNDLE}"
            exit 1
          fi
          xcrun llvm-cov export \
            --format=lcov \
            --instr-profile="${PROF}" \
            --ignore-filename-regex='(\.build|Tests|UITests|Frameworks|checkouts)/' \
            "${TEST_BIN}" > coverage.lcov
          echo "--- coverage summary ---"
          xcrun llvm-cov report \
            --instr-profile="${PROF}" \
            --ignore-filename-regex='(\.build|Tests|UITests|Frameworks|checkouts)/' \
            "${TEST_BIN}" | tail -3

      # Codecov upload is a hard gate on PRs: if the upload fails (token
      # revoked, Codecov outage, malformed lcov), the job fails so we
      # don't silently ship a PR with missing coverage visibility.
      # Coverage is also attached as the `coverage-report` workflow
      # artifact below so a reviewer can inspect it directly.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && hashFiles('coverage.lcov') != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov
          fail_ci_if_error: true
          flags: unit
          disable_search: true

      - name: Upload coverage artifact
        if: ${{ !cancelled() && hashFiles('coverage.lcov') != '' }}
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.lcov
          retention-days: 7

      # Parse the teed logs into a structured PR-visible summary. Runs even
      # when earlier steps fail — the whole point is to make failures easy
      # to triage without scrolling raw logs. See `scripts/ci-summary.py`.
      #
      # `|| true` at the end ensures the summary step itself never flips a
      # green job red: a diagnostic tool that hides its own failures (or
      # masks a real build failure behind a summary crash) is worse than
      # useless. The script's internal try/except prints a visible
      # fallback to the summary on crash.
      #
      # We deliberately do NOT upload `build.log` / `test.log` as
      # workflow artifacts. They contain verbatim `swift test` output,
      # and any future test fixture that accidentally echoes PHI (SOAP
      # body, transcript, Cliniko request body) would egress for 7+ days
      # to GitHub artifacts — exactly what `.claude/references/phi-handling.md`
      # forbids. The rendered summary + the raw workflow log are enough
      # for triage.
      - name: CI summary
        if: ${{ always() }}
        shell: bash
        run: |
          python3 scripts/ci-summary.py \
            --job "Build and Test" \
            --build-log build.log \
            --test-log test.log \
            --job-status "${{ job.status }}" \
            --out "$GITHUB_STEP_SUMMARY" \
            || echo "::warning::ci-summary.py exited non-zero; see raw log"

  build:
    name: Build Release
    runs-on: macos-15
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode version
        # Xcode 16.4 ships Swift 6.1 (Xcode 16.2 ships 6.0.3, which fails to
        # resolve mlx-swift-lm 3.31.x — that package's Package.swift declares
        # `swift-tools-version: 6.1`). Bumped 2026-04-26 in #3.
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache sherpa-onnx xcframework
        uses: actions/cache@v5
        with:
          path: Frameworks/sherpa-onnx.xcframework
          key: sherpa-onnx-v1.12.20-${{ runner.os }}

      - name: Setup sherpa-onnx xcframework
        run: ./scripts/setup-sherpa-onnx.sh

      - name: Build release
        shell: bash
        run: |
          set -euo pipefail
          : > build.log
          swift build -c release 2>&1 | tee build.log

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-build
          path: .build/release/
          retention-days: 7

      # Parse the teed build log into a PR-visible summary (warnings /
      # errors by diagnostic category). Runs even on failure. See notes on
      # the equivalent step in the `test` job — no log-artifact upload
      # (PHI policy), `|| true` to isolate summary-script failures from
      # the job's own exit status.
      - name: CI summary
        if: ${{ always() }}
        shell: bash
        run: |
          python3 scripts/ci-summary.py \
            --job "Build Release" \
            --build-log build.log \
            --job-status "${{ job.status }}" \
            --out "$GITHUB_STEP_SUMMARY" \
            || echo "::warning::ci-summary.py exited non-zero; see raw log"

      # Note: Smoke tests require real macOS hardware with audio/accessibility
      # Use scripts/smoke-test.sh locally before merging
