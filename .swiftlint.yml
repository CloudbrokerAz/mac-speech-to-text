# SwiftLint Configuration for SpeechToText macOS App

disabled_rules:
  - trailing_whitespace
  - line_length
  - type_body_length
  - function_body_length
  - file_length
  - function_parameter_count

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - sorted_imports
  - closure_spacing
  - operator_usage_whitespace

excluded:
  - .build
  - build
  - DerivedData
  - Tests
  - Resources
  - xcode-project
  - Vendor

line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
    - id
    - db
    - ui
    - ax
    - i
    - x
    - y
    - t
    - n
    - p
    - o

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
    error: 3

reporter: "xcode"

# Custom rules to catch common Swift concurrency issues
custom_rules:
  # Detect @Observable classes with actor existential properties that aren't @ObservationIgnored
  # This pattern can cause crashes due to executor check failures
  observable_actor_existential_warning:
    name: "Observable Actor Existential"
    regex: '^(?!.*@ObservationIgnored).*(?:private|fileprivate)\s+let\s+\w+:\s*any\s+\w*(?:Protocol|Service)'
    message: "Actor existential types in @Observable classes should use @ObservationIgnored to prevent executor check crashes"
    severity: warning

  # Flag nonisolated(unsafe) for manual synchronisation review
  nonisolated_unsafe_warning:
    name: "Nonisolated Unsafe"
    regex: '(?m)^(?!\s*(?:///|//))[^\n]*nonisolated\(unsafe\)'
    message: "nonisolated(unsafe) opts out of concurrency checking — verify synchronisation story (see .claude/references/concurrency.md)"
    severity: warning
